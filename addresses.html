<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manzillarim</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7VhjDfPWmJC37dSrpMEOCv5T61ts1cXE&libraries=places"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: #F5F5F5;
      color: #202124;
      min-height: 100vh;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      padding: 14px 16px;
      border-bottom: 1px solid #F0F0F0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .page-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #202124;
    }

    .addr-list {
      padding: 12px 16px;
    }

    .addr-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .addr-card.selected {
      border: 2px solid #FAB95B;
      background: #FFF8EE;
    }

    .addr-card:not(.selected) {
      border: 2px solid transparent;
    }

    .addr-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .addr-info {
      flex: 1;
      min-width: 0;
    }

    .addr-label-row {
      font-size: 0.83rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 2px;
    }

    .addr-text {
      font-size: 0.93rem;
      color: #202124;
      word-break: break-word;
    }

    .addr-comment {
      font-size: 0.78rem;
      color: #999;
      margin-top: 3px;
    }

    .addr-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: #999;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .del-btn:hover {
      background: #FFEBEE;
      color: #D32F2F;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px 40px;
      color: #BDBDBD;
    }

    .empty-state svg {
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .add-btn {
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 14px;
      background: #FAB95B;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: sticky;
      bottom: 16px;
      box-shadow: 0 4px 14px rgba(250, 185, 91, 0.4);
    }

    /* ===== MAP MODAL ===== */
    #mapPickerModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      align-items: flex-end;
      justify-content: center;
    }

    #mapPickerStep {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    #mapFormStep {
      display: none;
      flex-direction: column;
      width: 100%;
      max-height: 80vh;
      background: #fff;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
    }

    #leafletMapContainer {
      width: 100%;
      height: 100%;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #F0F0F0;
      background: #fff;
      flex-shrink: 0;
    }

    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      color: #202124;
    }

    .modal-close-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .map-area {
      flex: 1;
      position: relative;
    }

    .center-pin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -100%);
      pointer-events: none;
      z-index: 1000;
    }

    .gps-btn {
      position: absolute;
      bottom: 80px;
      left: 12px;
      z-index: 1000;
      background: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #FAB95B;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-footer {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #F0F0F0;
      flex-shrink: 0;
    }

    .primary-btn {
      width: 100%;
      padding: 14px;
      background: #FAB95B;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .back-link-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #FAB95B;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group {
      margin-bottom: 14px;
    }

    #detectedAddressText {
      background: #F5F5F5;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.93rem;
      color: #202124;
      min-height: 44px;
    }

    #addressCommentInput {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid #E0E0E0;
      font-family: 'Poppins', sans-serif;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <div class="page-header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#202124" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <span class="page-title">Manzillarim</span>
  </div>

  <div class="addr-list" id="addrList"></div>

  <div style="padding: 0 16px 16px;">
    <button class="add-location-btn" onclick="openMapModal()"
      style="display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 14px; padding: 14px 16px; margin-bottom: 24px; border: 2px dashed #D0D0D0; border-radius: 12px; background: transparent; width: 100%;">
      <div
        style="width: 44px; height: 44px; background: #F5F5F5; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FAB95B" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </div>
      <div style="font-weight: 700; color: #5B636A; font-size: 1.05rem;">Yangi manzil qo'shish</div>
    </button>
  </div>

  <!-- ===== MAP PICKER MODAL ===== -->
  <div id="mapPickerModal"
    style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:flex-end;justify-content:center;">
    <!-- MAP STEP -->
    <div id="mapPickerStep"
      style="display:flex;flex-direction:column;width:100%;height:100%;background:#fff;position:relative;">
      <div class="modal-header">
        <span class="modal-title">Manzil tanlash</span>
        <button class="modal-close-btn" onclick="closeMapModal()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="map-area">
        <div id="leafletMapContainer" style="width:100%;height:100%;"></div>
        <!-- Fixed center pin -->
        <div class="center-pin">
          <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 0C8.06 0 0 8.06 0 18C0 31.5 18 48 18 48C18 48 36 31.5 36 18C36 8.06 27.94 0 18 0Z"
              fill="#FAB95B" />
            <circle cx="18" cy="18" r="7" fill="white" />
            <circle cx="18" cy="18" r="4" fill="#FAB95B" />
            <ellipse cx="18" cy="46" rx="4" ry="2" fill="rgba(0,0,0,0.15)" />
          </svg>
        </div>
        <button id="gpsBtn" class="gps-btn" onclick="useGPS()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FAB95B" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11" />
          </svg>
          GPS bilan aniqlash
        </button>
      </div>
      <div class="modal-footer">
        <button id="confirmMapBtn" class="primary-btn" onclick="confirmMap()">Tasdiqlash</button>
      </div>
    </div>

    <!-- FORM STEP -->
    <div id="mapFormStep"
      style="display:none;flex-direction:column;width:100%;max-height:80vh;background:#fff;border-radius:20px 20px 0 0;overflow:hidden;">
      <div class="modal-header">
        <button class="back-link-btn" onclick="_showMapStep()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FAB95B" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Orqaga
        </button>
        <span class="modal-title">Manzilni tasdiqlang</span>
        <button class="modal-close-btn" onclick="closeMapModal()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div style="padding:16px;overflow-y:auto;flex:1;">
        <div class="form-group">
          <div class="form-label">Aniqlangan manzil</div>
          <div id="detectedAddressText"></div>
        </div>
        <div class="form-group">
          <div class="form-label">Izoh (ixtiyoriy)</div>
          <textarea id="addressCommentInput" placeholder="Masalan: 3-qavat, 12-xonadon, sariq eshik..."
            rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="primary-btn" onclick="saveNewAddress()">Saqlash</button>
      </div>
    </div>
  </div>

  <script>
    // ========================
    // SHARED ADDRESS FUNCTIONS
    // ========================
    function loadAddresses() {
      try { return JSON.parse(localStorage.getItem('saved_addresses') || '[]'); } catch (e) { return []; }
    }
    function saveAddresses(list) {
      localStorage.setItem('saved_addresses', JSON.stringify(list));
    }
    function getSelectedId() {
      return localStorage.getItem('selected_address_id') || null;
    }
    function setSelectedId(id) {
      localStorage.setItem('selected_address_id', id || '');
    }

    // ========================
    // RENDER
    // ========================
    function renderAddresses() {
      const container = document.getElementById('addrList');
      const addrs = loadAddresses();
      const selId = getSelectedId();
      container.innerHTML = '';

      if (addrs.length === 0) {
        container.innerHTML = '';
        return;
      }

      addrs.forEach(addr => {
        const card = document.createElement('div');
        card.className = 'addr-card' + (addr.id === selId ? ' selected' : '');
        card.onclick = () => selectAddress(addr.id);

        const iconDiv = document.createElement('div');
        iconDiv.className = 'addr-icon';
        iconDiv.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="${addr.id === selId ? '#FAB95B' : '#BDBDBD'}"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

        const infoDiv = document.createElement('div');
        infoDiv.className = 'addr-info';

        const labelRow = document.createElement('div');
        labelRow.className = 'addr-label-row';
        if (addr.id === selId) {
          labelRow.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px; vertical-align:middle;"><polyline points="20 6 9 17 4 12"></polyline></svg><span style="vertical-align:middle;">Tanlangan manzil</span>';
        } else {
          labelRow.textContent = 'Manzil';
        }

        const textDiv = document.createElement('div');
        textDiv.className = 'addr-text';
        textDiv.textContent = addr.label || '';

        infoDiv.appendChild(labelRow);
        infoDiv.appendChild(textDiv);

        if (addr.comment) {
          const commentDiv = document.createElement('div');
          commentDiv.className = 'addr-comment';
          commentDiv.textContent = addr.comment;
          infoDiv.appendChild(commentDiv);
        }

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'addr-actions';

        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.title = "O'chirish";
        delBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
        delBtn.onclick = (e) => { e.stopPropagation(); deleteAddress(addr.id); };
        actionsDiv.appendChild(delBtn);

        card.appendChild(iconDiv);
        card.appendChild(infoDiv);
        card.appendChild(actionsDiv);
        container.appendChild(card);
      });
    }

    function selectAddress(id) {
      setSelectedId(id);
      renderAddresses();
    }

    function deleteAddress(id) {
      if (!confirm("O'chirishni tasdiqlaysizmi?")) return;
      let list = loadAddresses();
      list = list.filter(a => a.id !== id);
      saveAddresses(list);
      if (getSelectedId() === id) {
        setSelectedId(list.length > 0 ? list[0].id : null);
      }
      renderAddresses();
    }

    // ========================
    // MAP MODAL
    // ========================
    let _mapInstance = null;
    let _selectedLat = 41.2995;
    let _selectedLng = 69.2401;

    function openMapModal() {
      const modal = document.getElementById('mapPickerModal');
      if (!modal) return;
      _showMapStep();
      modal.style.display = 'flex';
      setTimeout(() => {
        if (!_mapInstance) {
          _mapInstance = new google.maps.Map(document.getElementById('leafletMapContainer'), {
            center: { lat: _selectedLat, lng: _selectedLng },
            zoom: 15,
            disableDefaultUI: true,
            zoomControl: true,
            zoomControlOptions: {
              position: google.maps.ControlPosition.RIGHT_BOTTOM
            }
          });
          _mapInstance.addListener('dragend', onMapMoveUpdateCenter);
          _mapInstance.addListener('zoom_changed', onMapMoveUpdateCenter);
        } else {
          google.maps.event.trigger(_mapInstance, 'resize');
          _mapInstance.setCenter({ lat: _selectedLat, lng: _selectedLng });
        }
      }, 80);
    }

    function closeMapModal() {
      const modal = document.getElementById('mapPickerModal');
      if (modal) modal.style.display = 'none';
    }

    function _showMapStep() {
      document.getElementById('mapPickerStep').style.display = 'flex';
      document.getElementById('mapFormStep').style.display = 'none';
    }

    function _showFormStep(label) {
      document.getElementById('mapPickerStep').style.display = 'none';
      const formDiv = document.getElementById('mapFormStep');
      formDiv.style.display = 'flex';
      const detectedEl = document.getElementById('detectedAddressText');
      if (detectedEl) detectedEl.textContent = label || '';
      const commentEl = document.getElementById('addressCommentInput');
      if (commentEl) commentEl.value = '';
    }

    function useGPS() {
      if (!navigator.geolocation) { alert('GPS bu qurilmada qo\'llab-quvvatlanmaydi.'); return; }
      const btn = document.getElementById('gpsBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Aniqlanmoqda...'; }
      navigator.geolocation.getCurrentPosition(
        pos => {
          _selectedLat = pos.coords.latitude;
          _selectedLng = pos.coords.longitude;
          if (_mapInstance) _mapInstance.setCenter({ lat: _selectedLat, lng: _selectedLng });
          _mapInstance.setZoom(17);
          if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FAB95B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg> GPS bilan aniqlash'; }
        },
        () => {
          if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FAB95B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg> GPS bilan aniqlash'; }
          alert('GPS ruxsati berilmadi yoki aniqlashda xato.');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function onMapMoveUpdateCenter() {
      if (!_mapInstance) return;
      const c = _mapInstance.getCenter();
      _selectedLat = c.lat();
      _selectedLng = c.lng();
    }

    async function reverseGeocode(lat, lng) {
      return new Promise((resolve) => {
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location: { lat, lng } }, (results, status) => {
          if (status === 'OK' && results[0]) {
            resolve(results[0].formatted_address);
          } else {
            resolve(null);
          }
        });
      });
    }

    async function confirmMap() {
      const btn = document.getElementById('confirmMapBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Aniqlanmoqda...'; }
      let label = await reverseGeocode(_selectedLat, _selectedLng);
      if (!label) label = `${_selectedLat.toFixed(5)}, ${_selectedLng.toFixed(5)} (Manzil topilmadi, lokatsiya saqlanadi.)`;
      if (btn) { btn.disabled = false; btn.textContent = 'Tasdiqlash'; }
      _showFormStep(label);
    }

    function saveNewAddress() {
      const detectedEl = document.getElementById('detectedAddressText');
      const commentEl = document.getElementById('addressCommentInput');
      const label = detectedEl ? detectedEl.textContent.trim() : '';
      const comment = commentEl ? commentEl.value.trim() : '';

      const newAddr = {
        id: 'addr_' + Date.now(),
        lat: _selectedLat,
        lng: _selectedLng,
        label: label,
        comment: comment,
        createdAt: Date.now()
      };

      const list = loadAddresses();
      list.push(newAddr);
      saveAddresses(list);
      setSelectedId(newAddr.id);

      closeMapModal();
      renderAddresses();
    }

    // Init
    renderAddresses();
  </script>
</body>

</html>
