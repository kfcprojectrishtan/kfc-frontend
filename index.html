<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Suspended</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; }

    .top {
      height: 155px;
      background: #f2f2f2;
      border-top: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      color: #cfcfcf;
      overflow: hidden;
    }
    .top h1 { margin: 0; font-size: 72px; font-weight: 400; color: #cfcfcf; white-space: nowrap; }

    .user-icon { position: relative; width: 150px; height: 95px; flex-shrink: 0; }
    .user-icon .head {
      width: 72px; height: 72px; border-radius: 50%;
      background: #cfcfcf; position: absolute; top: -8px; left: 22px;
    }
    .user-icon .body {
      width: 96px; height: 48px; background: #cfcfcf;
      border-radius: 28px 28px 12px 12px;
      position: absolute; bottom: 0; left: 10px;
    }
    .user-icon .x::before, .user-icon .x::after {
      content: ""; position: absolute;
      width: 10px; height: 56px;
      background: #cfcfcf; border-radius: 4px;
      top: 4px; right: 18px;
    }
    .user-icon .x::before { transform: rotate(45deg); }
    .user-icon .x::after { transform: rotate(-45deg); }

    .banner {
      min-height: 270px;
      background: #2f4358;
      display: flex;
      overflow: hidden;
    }
    .warning-side {
      width: 270px;
      height: 270px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content { padding: 30px 30px 30px 0; color: #fff; }
    .content h2 { margin: 0 0 28px; font-size: 32px; font-weight: 700; }
    .content p { margin: 0; font-size: 24px; }
    .content a { color: #fff; text-decoration: underline; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .top {
        height: 80px;
        gap: 10px;
        justify-content: flex-start;
        padding: 0 16px;
      }
      .top h1 { font-size: 28px; }

      .user-icon { width: 42px; height: 52px; }
      .user-icon .head { width: 30px; height: 30px; top: 0; left: 6px; }
      .user-icon .body { width: 42px; height: 22px; border-radius: 14px 14px 6px 6px; left: 0; }
      .user-icon .x::before, .user-icon .x::after {
        width: 5px; height: 26px; top: 2px; right: 6px;
      }

      .banner { flex-direction: column; min-height: unset; }
      .warning-side { display: none; }
      .content { padding: 24px 20px; }
      .content h2 { font-size: 24px; margin-bottom: 16px; }
      .content p { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="user-icon">
      <div class="head"></div>
      <div class="body"></div>
      <div class="x"></div>
    </div>
    <h1>Account Suspended</h1>
  </div>
  <div class="banner">
    <div class="warning-side">
      <svg width="230" height="230" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
        <polygon points="10,20 220,20 115,210" fill="none" stroke="#617286" stroke-width="22" stroke-linejoin="miter"/>
        <rect x="97" y="48" width="36" height="100" rx="4" fill="#7a8fa3"/>
        <circle cx="115" cy="175" r="14" fill="#7a8fa3"/>
      </svg>
    </div>
    <div class="content">
      <h2>This Account has been suspended.</h2>
      <p><a href="#">Contact your hosting provider</a> for more information.</p>
    </div>
  </div>
</body>
</html>
